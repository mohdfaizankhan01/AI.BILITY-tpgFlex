<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tpgFlex – Driver Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: #131620;
  border-bottom: 2px solid #f59e0b;
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.logo { font-size: 20px; font-weight: 800; }
.logo span { color: #e63312; }
.hdr-sub { font-size: 12px; color: #6b7280; }
#conn-pill {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  background: #1e2235;
  border: 1px solid #ffffff15;
}
#conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #6b7280;
  transition: background .3s;
}
#conn-dot.live { background: #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
#conn-label { color: #9ca3af; transition: color .3s; }
#conn-label.live { color: #4ade80; }

main {
  flex: 1;
  padding: 24px;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #6b7280;
  margin-bottom: 14px;
}

/* Alert banner for new incoming request */
#alert-banner {
  display: none;
  background: #7c2d12;
  border: 2px solid #f97316;
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 20px;
  align-items: center;
  gap: 14px;
  animation: shake .4s ease;
}
#alert-banner.visible { display: flex; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.alert-icon { font-size: 32px; flex-shrink: 0; }
.alert-msg { font-size: 15px; font-weight: 700; color: #fed7aa; line-height: 1.4; }
.alert-sub { font-size: 12px; color: #fb923c; margin-top: 3px; }

/* Request cards */
#requests-list { display: flex; flex-direction: column; gap: 14px; }

.req-card {
  background: #1a1d27;
  border: 2px solid #374151;
  border-radius: 16px;
  padding: 18px;
  transition: border-color .3s;
}
.req-card.pending   { border-color: #f97316; }
.req-card.confirmed { border-color: #22c55e; opacity: .7; }

.req-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.req-icon  { font-size: 28px; }
.req-title { font-size: 16px; font-weight: 800; }
.req-sub   { font-size: 12px; color: #6b7280; margin-top: 2px; }
.req-badge {
  margin-left: auto;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.req-badge.pending   { background: #7c2d12; color: #fb923c; }
.req-badge.confirmed { background: #14532d; color: #4ade80; }

.req-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.detail-item { background: #131620; border-radius: 8px; padding: 8px 12px; }
.detail-lbl  { font-size: 9px; color: #6b7280; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }
.detail-val  { font-size: 13px; font-weight: 700; }

.confirm-btn {
  width: 100%;
  padding: 14px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: .3px;
  transition: background .2s, opacity .2s;
}
.confirm-btn:hover { background: #15803d; }
.confirm-btn:disabled { background: #1e293b; color: #4b5563; cursor: default; }
.confirmed-label {
  text-align: center;
  padding: 12px;
  color: #4ade80;
  font-weight: 700;
  font-size: 14px;
}

#empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #374151;
}
#empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
#empty-state .empty-text { font-size: 15px; }
</style>
</head>
<body>

<header>
  <div class="logo"><span>tpg</span>Flex</div>
  <div class="hdr-sub">Driver Panel</div>
  <div id="conn-pill">
    <div id="conn-dot"></div>
    <span id="conn-label">Connecting…</span>
  </div>
</header>

<main>
  <div id="alert-banner">
    <div class="alert-icon">🔔</div>
    <div>
      <div class="alert-msg" id="alert-msg">New ramp request!</div>
      <div class="alert-sub" id="alert-sub"></div>
    </div>
  </div>

  <div class="section-title">Ramp Requests</div>
  <div id="requests-list">
    <div id="empty-state">
      <div class="empty-icon">♿</div>
      <div class="empty-text">No ramp requests yet.<br>They will appear here in real time.</div>
    </div>
  </div>
</main>

<script>
const API = "";
const cards = {};

function setConnected(live) {
  document.getElementById("conn-dot").classList.toggle("live", live);
  document.getElementById("conn-label").classList.toggle("live", live);
  document.getElementById("conn-label").textContent = live ? "Connected" : "Reconnecting…";
}

function profileLabel(profile) {
  return profile === "motor-wheelchair" ? "Motor (Electric) Wheelchair"
       : profile === "manual-wheelchair" ? "Manual Wheelchair"
       : profile;
}

function profileIcon(profile) {
  return profile === "motor-wheelchair" ? "♿" : "🦽";
}

function fmtTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function showAlert(ramp) {
  const banner = document.getElementById("alert-banner");
  document.getElementById("alert-msg").textContent = `🔔 Ramp needed at ${ramp.stop_name}`;
  document.getElementById("alert-sub").textContent =
    `Vehicle ${ramp.vehicle_id} · ${profileLabel(ramp.profile)}`;
  banner.classList.add("visible");
  setTimeout(() => banner.classList.remove("visible"), 6000);

  if (Notification.permission === "granted") {
    new Notification("tpgFlex — Ramp Request", {
      body: `Open ramp at ${ramp.stop_name} for ${profileLabel(ramp.profile)} (${ramp.vehicle_id})`,
      icon: ""
    });
  }
}

function addCard(ramp) {
  const empty = document.getElementById("empty-state");
  if (empty) empty.remove();

  if (cards[ramp.id]) { updateCardStatus(ramp); return; }

  const div = document.createElement("div");
  div.className = `req-card ${ramp.status}`;
  div.id = `card-${ramp.id}`;
  div.innerHTML = `
    <div class="req-header">
      <div class="req-icon">${profileIcon(ramp.profile)}</div>
      <div>
        <div class="req-title">Ramp Required at ${ramp.stop_name}</div>
        <div class="req-sub">${profileLabel(ramp.profile)} · Booking ${ramp.booking_id}</div>
      </div>
      <div class="req-badge ${ramp.status}" id="badge-${ramp.id}">
        ${ramp.status === "pending" ? "Pending" : "Confirmed ✓"}
      </div>
    </div>
    <div class="req-details">
      <div class="detail-item">
        <div class="detail-lbl">Stop</div>
        <div class="detail-val">${ramp.stop_name}</div>
      </div>
      <div class="detail-item">
        <div class="detail-lbl">Vehicle</div>
        <div class="detail-val">${ramp.vehicle_id}</div>
      </div>
      <div class="detail-item">
        <div class="detail-lbl">Request ID</div>
        <div class="detail-val" style="font-size:11px">${ramp.id}</div>
      </div>
      <div class="detail-item">
        <div class="detail-lbl">Received at</div>
        <div class="detail-val" style="font-size:12px">${fmtTime(ramp.created_at)}</div>
      </div>
    </div>
    <div id="action-${ramp.id}">
      ${ramp.status === "pending"
        ? `<button class="confirm-btn" onclick="confirmRamp('${ramp.id}')">
             ✅ Open Ramp Confirmed
           </button>`
        : `<div class="confirmed-label">✅ Ramp confirmed — passenger notified</div>`
      }
    </div>`;

  document.getElementById("requests-list").prepend(div);
  cards[ramp.id] = div;
}

function updateCardStatus(ramp) {
  const card  = document.getElementById(`card-${ramp.id}`);
  const badge = document.getElementById(`badge-${ramp.id}`);
  const action = document.getElementById(`action-${ramp.id}`);
  if (!card) return;
  card.className = `req-card ${ramp.status}`;
  if (badge) {
    badge.className = `req-badge ${ramp.status}`;
    badge.textContent = ramp.status === "pending" ? "Pending" : "Confirmed ✓";
  }
  if (action && ramp.status === "acknowledged") {
    action.innerHTML = `<div class="confirmed-label">✅ Ramp confirmed at ${fmtTime(ramp.acknowledged_at)} — passenger notified</div>`;
  }
}

async function confirmRamp(reqId) {
  const btn = document.querySelector(`#action-${reqId} .confirm-btn`);
  if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }
  try {
    await fetch(`${API}/ramp-request/${reqId}/acknowledge`, { method: "POST" });
    updateCardStatus({ id: reqId, status: "acknowledged", acknowledged_at: new Date().toISOString() });
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = "✅ Open Ramp Confirmed"; }
    alert("Failed to send confirmation. Please try again.");
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws/driver`);

  ws.onopen  = () => setConnected(true);
  ws.onclose = () => { setConnected(false); setTimeout(connect, 2500); };
  ws.onerror = () => ws.close();

  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === "ramp_request")    { addCard(msg.data); showAlert(msg.data); }
    else if (msg.type === "ramp_acknowledged") { updateCardStatus(msg.data); }
  };
}
connect();

if ("Notification" in window && Notification.permission === "default") {
  Notification.requestPermission();
}
</script>
</body>
</html>
