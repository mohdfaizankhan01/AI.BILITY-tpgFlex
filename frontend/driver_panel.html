<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tpgFlex – Driver Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: #131620;
  border-bottom: 2px solid #f59e0b;
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.logo { font-size: 20px; font-weight: 800; }
.logo span { color: #e63312; }
.hdr-sub { font-size: 12px; color: #6b7280; }
#conn-pill {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  background: #1e2235;
  border: 1px solid #ffffff15;
}
#conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #6b7280;
  transition: background .3s;
}
#conn-dot.live { background: #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
#conn-label { color: #9ca3af; transition: color .3s; }
#conn-label.live { color: #4ade80; }

main {
  flex: 1;
  padding: 24px;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #6b7280;
  margin-bottom: 14px;
}

/* Alert banner for new incoming request */
#alert-banner {
  display: none;
  background: #7c2d12;
  border: 2px solid #f97316;
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 20px;
  display: none;
  align-items: center;
  gap: 14px;
  animation: shake .4s ease;
}
#alert-banner.visible { display: flex; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.alert-icon { font-size: 32px; flex-shrink: 0; }
.alert-msg { font-size: 15px; font-weight: 700; color: #fed7aa; line-height: 1.4; }
.alert-sub { font-size: 12px; color: #fb923c; margin-top: 3px; }

/* Request cards */
#requests-list { display: flex; flex-direction: column; gap: 14px; }

.req-card {
  background: #1a1d27;
  border: 2px solid #374151;
  border-radius: 16px;
  padding: 18px;
  transition: border-color .3s;
}
.req-card.pending  { border-color: #f97316; }
.req-card.confirmed { border-color: #22c55e; opacity: .7; }

.req-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.req-icon { font-size: 28px; }
.req-title { font-size: 16px; font-weight: 800; }
.req-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
.req-badge {
  margin-left: auto;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.req-badge.pending    { background: #7c2d12; color: #fb923c; }
.req-badge.confirmed  { background: #14532d; color: #4ade80; }

.req-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.detail-item {
  background: #131620;
  border-radius: 8px;
  padding: 8px 12px;
}
.detail-lbl { font-size: 9px; color: #6b7280; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }
.detail-val { font-size: 13px; font-weight: 700; }

.confirm-btn {
  width: 100%;
  padding: 14px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: .3px;
  transition: background .2s, opacity .2s;
}
.confirm-btn:hover { background: #15803d; }
.confirm-btn:disabled {
  background: #1e293b;
  color: #4b5563;
  cursor: default;
}
.confirmed-label {
  text-align: center;
  padding: 12px;
  color: #4ade80;
  font-weight: 700;
  font-size: 14px;
}

#empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #374151;
}
#empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
#empty-state .empty-text { font-size: 15px; }

/* ── Adaptive Waiting (accessibility) ───────────────────────────────────────── */
.aw-tag {
  display:inline-flex; align-items:center; gap:5px;
  font-size:10px; font-weight:700; color:#60a5fa;
  background:#1e3a5f; border:1px solid #3b82f6;
  padding:2px 9px; border-radius:20px; margin-left:10px;
}
#aw-list { display:flex; flex-direction:column; gap:14px; margin-bottom:30px; }
.aw-card {
  background:#1a1d27; border:2px solid #3b82f6;
  border-radius:16px; padding:18px;
  transition:border-color .3s, opacity .3s;
}
.aw-card.held    { border-color:#22c55e; }
.aw-card.departed{ border-color:#7f1d1d; opacity:.65; }
.aw-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.aw-ic  { font-size:30px; flex-shrink:0; }
.aw-name{ font-size:16px; font-weight:800; }
.aw-meta{ font-size:12px; color:#6b7280; margin-top:2px; }
.aw-pill{
  margin-left:auto; padding:4px 12px; border-radius:20px;
  font-size:11px; font-weight:700;
  background:#1e3a5f; color:#60a5fa;
}
.aw-card.held    .aw-pill{ background:#14532d; color:#4ade80; }
.aw-card.departed .aw-pill{ background:#7f1d1d; color:#fca5a5; }
.aw-card.arrived  { border-color:#22c55e; }
.aw-card.arrived  .aw-pill{ background:#14532d; color:#4ade80; }

/* Stats row: distance · ETA · movement */
.aw-stats {
  display:grid; grid-template-columns:auto auto 1fr; gap:18px;
  align-items:center; margin-bottom:12px;
}
.aw-stat-v { font-size:24px; font-weight:900; line-height:1; }
.aw-stat-v.m   { color:#f59e0b; }
.aw-stat-v.eta { color:#e2e8f0; font-size:18px; }
.aw-stat-l { font-size:9px; color:#6b7280; text-transform:uppercase;
             letter-spacing:.7px; margin-top:4px; }
.aw-move {
  justify-self:end; display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:700; padding:5px 11px; border-radius:20px;
}
.aw-move.toward  { background:#14532d; color:#4ade80; }
.aw-move.stopped { background:#422006; color:#fbbf24; }
.aw-move.away    { background:#450a0a; color:#fca5a5; }

.aw-suggest {
  display:flex; align-items:center; gap:8px;
  font-size:12px; color:#cbd5e1;
  background:#0f1117; border:1px solid #ffffff10;
  border-radius:10px; padding:9px 12px; margin-bottom:12px;
}
.aw-suggest b { color:#fff; }
.aw-suggest .lbl { color:#6b7280; font-size:10px; text-transform:uppercase;
                   letter-spacing:.6px; flex-shrink:0; }

.aw-wait-row {
  display:flex; justify-content:space-between; align-items:center;
  font-size:10px; color:#6b7280; text-transform:uppercase;
  letter-spacing:.6px; margin-bottom:5px;
}
.aw-wait-row b { color:#fbbf24; font-size:12px; }
.aw-bar-wrap{ height:6px; background:#0f1117; border-radius:4px; overflow:hidden; margin-bottom:14px; }
.aw-bar { height:100%; background:linear-gradient(to right,#22c55e,#f59e0b);
          border-radius:4px; transition:width 1s linear; }
.aw-actions{ display:flex; gap:10px; }
.aw-btn {
  flex:1; padding:13px; border:none; border-radius:11px;
  font-size:13px; font-weight:800; cursor:pointer; color:#fff;
}
.aw-wait  { background:#16a34a; }
.aw-wait:hover { background:#15803d; }
.aw-go    { background:#374151; }
.aw-go:hover   { background:#4b5563; }
.aw-resolved{
  text-align:center; padding:13px; font-weight:700; font-size:13px;
}
.aw-card.held    .aw-resolved{ color:#4ade80; }
.aw-card.arrived .aw-resolved{ color:#4ade80; }
.aw-card.departed .aw-resolved{ color:#fca5a5; }
.aw-note {
  font-size:10px; color:#4b5563; text-align:center;
  margin:-6px 0 26px; letter-spacing:.3px;
}
</style>
</head>
<body>

<header>
  <div class="logo"><span>tpg</span>Flex</div>
  <div class="hdr-sub">Driver Panel</div>
  <div id="conn-pill">
    <div id="conn-dot"></div>
    <span id="conn-label">Connecting…</span>
  </div>
</header>

<main>
  <div id="alert-banner">
    <div class="alert-icon">🔔</div>
    <div>
      <div class="alert-msg" id="alert-msg">New ramp request!</div>
      <div class="alert-sub" id="alert-sub"></div>
    </div>
  </div>

  <div class="section-title">Adaptive Waiting <span class="aw-tag">♿ Accessibility</span></div>
  <div id="aw-list"></div>
  <div class="aw-note">Demo preview · passengers with an accessibility profile who haven't reached the stop yet</div>

  <div class="section-title">Ramp Requests</div>
  <div id="requests-list">
    <div id="empty-state">
      <div class="empty-icon">♿</div>
      <div class="empty-text">No ramp requests yet.<br>They will appear here in real time.</div>
    </div>
  </div>
</main>

<script>
const API = "";   // same origin
const cards = {}; // req_id → card element

function setConnected(live) {
  document.getElementById("conn-dot").classList.toggle("live", live);
  document.getElementById("conn-label").classList.toggle("live", live);
  document.getElementById("conn-label").textContent = live ? "Connected" : "Reconnecting…";
}

function profileLabel(profile) {
  return profile === "motor-wheelchair" ? "Motor (Electric) Wheelchair"
       : profile === "manual-wheelchair" ? "Manual Wheelchair"
       : profile;
}

function profileIcon(profile) {
  return profile === "motor-wheelchair" ? "♿" : "🦽";
}

function fmtTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function showAlert(ramp) {
  const banner = document.getElementById("alert-banner");
  document.getElementById("alert-msg").textContent =
    `🔔 Ramp needed at ${ramp.stop_name}`;
  document.getElementById("alert-sub").textContent =
    `Vehicle ${ramp.vehicle_id} · ${profileLabel(ramp.profile)}`;
  banner.classList.add("visible");
  setTimeout(() => banner.classList.remove("visible"), 6000);

  // Browser notification if permitted
  if (Notification.permission === "granted") {
    new Notification("tpgFlex — Ramp Request", {
      body: `Open ramp at ${ramp.stop_name} for ${profileLabel(ramp.profile)} (${ramp.vehicle_id})`,
      icon: ""
    });
  }
}

function addCard(ramp) {
  const empty = document.getElementById("empty-state");
  if (empty) empty.remove();

  const existing = cards[ramp.id];
  if (existing) {
    // Update existing card status
    updateCardStatus(ramp);
    return;
  }

  const div = document.createElement("div");
  div.className = `req-card ${ramp.status}`;
  div.id = `card-${ramp.id}`;
  div.innerHTML = `
    <div class="req-header">
      <div class="req-icon">${profileIcon(ramp.profile)}</div>
      <div>
        <div class="req-title">Ramp Required at ${ramp.stop_name}</div>
        <div class="req-sub">${profileLabel(ramp.profile)} · Booking ${ramp.booking_id}</div>
      </div>
      <div class="req-badge ${ramp.status}" id="badge-${ramp.id}">
        ${ramp.status === "pending" ? "Pending" : "Confirmed ✓"}
      </div>
    </div>
    <div class="req-details">
      <div class="detail-item">
        <div class="detail-lbl">Stop</div>
        <div class="detail-val" id="detail-stop-${ramp.id}">${ramp.stop_name}</div>
      </div>
      <div class="detail-item">
        <div class="detail-lbl">Vehicle</div>
        <div class="detail-val">${ramp.vehicle_id}</div>
      </div>
      <div class="detail-item">
        <div class="detail-lbl">Request ID</div>
        <div class="detail-val" style="font-size:11px">${ramp.id}</div>
      </div>
      <div class="detail-item">
        <div class="detail-lbl">Received at</div>
        <div class="detail-val" style="font-size:12px">${fmtTime(ramp.created_at)}</div>
      </div>
    </div>
    <div id="action-${ramp.id}">
      ${ramp.status === "pending"
        ? `<button class="confirm-btn" onclick="confirmRamp('${ramp.id}', '${ramp.stop_name}')">
             ✅ Open Ramp Confirmed
           </button>`
        : `<div class="confirmed-label">✅ Ramp confirmed — passenger notified</div>`
      }
    </div>`;

  document.getElementById("requests-list").prepend(div);
  cards[ramp.id] = div;
}

function updateCardStatus(ramp) {
  const card  = document.getElementById(`card-${ramp.id}`);
  const badge = document.getElementById(`badge-${ramp.id}`);
  const action = document.getElementById(`action-${ramp.id}`);
  if (!card) return;
  card.className = `req-card ${ramp.status}`;
  if (badge) {
    badge.className = `req-badge ${ramp.status}`;
    badge.textContent = ramp.status === "pending" ? "Pending" : "Confirmed ✓";
  }
  if (action && ramp.status === "acknowledged") {
    action.innerHTML = `<div class="confirmed-label">✅ Ramp confirmed at ${fmtTime(ramp.acknowledged_at)} — passenger notified</div>`;
  }
}

async function confirmRamp(reqId, stopName) {
  const btn = document.querySelector(`#action-${reqId} .confirm-btn`);
  if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }
  try {
    await fetch(`${API}/ramp-request/${reqId}/acknowledge`, { method: "POST" });
    // updateCardStatus called via WS echo; if WS is down, update locally
    updateCardStatus({ id: reqId, status: "acknowledged", acknowledged_at: new Date().toISOString() });
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = "✅ Open Ramp Confirmed"; }
    alert("Failed to send confirmation. Please try again.");
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws/driver`);

  ws.onopen  = () => setConnected(true);
  ws.onclose = () => { setConnected(false); setTimeout(connect, 2500); };
  ws.onerror = () => ws.close();

  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === "ramp_request") {
      addCard(msg.data);
      showAlert(msg.data);
    } else if (msg.type === "ramp_acknowledged") {
      updateCardStatus(msg.data);
    }
  };
}
connect();

// Request browser notification permission on page load
if ("Notification" in window && Notification.permission === "default") {
  Notification.requestPermission();
}

// ── Adaptive Waiting — DEMO ONLY (static example data, no backend) ─────────────
// Auto-shows on page open. Driver-Assisted Adaptive Waiting: the system shows
// distance / ETA / movement + an advisory line; the DRIVER decides (Hold/Depart).
const STD_WAIT = 120;   // standard wait window in seconds (2 min policy)

const AW_DEMO = [
  { id:"AW1", profile:"wheelchair-elderly", icon:"🦽", label:"Wheelchair · Elderly",
    booking:"BK_4471", stop:"Cornavin",         metres:120, walk:1.0, dir:"toward" },
];
AW_DEMO.forEach(p => { p.wait = STD_WAIT; p._start = p.metres; });

function awEta(p) {
  if (p.dir !== "toward" || p.walk <= 0) return "ETA unknown";
  const secs = Math.round(p.metres / p.walk);
  const m = Math.floor(secs / 60), s = secs % 60;
  return m > 0 ? `~${m} min ${s}s` : `~${s}s`;
}
function awMove(p) {
  if (p.dir === "toward")  return { cls:"toward",  txt:"Moving toward stop ✓" };
  if (p.dir === "stopped") return { cls:"stopped", txt:"Not moving" };
  return { cls:"away", txt:"Moving away" };
}
function awSuggest(p) {
  if (p.metres <= 15)                       return "At the stop — boarding now";
  if (p.dir === "away")                     return "Moving away — <b>may not make this ride</b>";
  if (p.dir === "stopped")                  return "Passenger has stopped — <b>may need a moment</b>";
  if (p.metres / Math.max(p.walk,0.1) <= 90) return "Likely to arrive soon — <b>consider holding</b>";
  return "On the way — moving toward the stop";
}
function fmt(secs) {
  secs = Math.max(0, secs);
  return `${Math.floor(secs/60)}:${String(secs%60).padStart(2,"0")}`;
}

function renderAW() {
  const list = document.getElementById("aw-list");
  list.innerHTML = "";
  AW_DEMO.forEach(p => {
    const div = document.createElement("div");
    div.className = "aw-card" + (p.state ? " " + p.state : "");
    div.id = "aw-" + p.id;

    const pill = p.state === "held"     ? "Holding"
               : p.state === "arrived"  ? "Arrived"
               : p.state === "departed" ? "Departed" : "Approaching";

    let body;
    if (p.state === "arrived") {
      body = `<div class="aw-resolved">✅ Passenger reached the stop — boarding now</div>`;
    } else if (p.state === "departed") {
      body = `<div class="aw-resolved">🚍 Departed — passenger notified they missed this bus</div>`;
    } else {
      const mv  = awMove(p);
      const pct = Math.round((p.wait / STD_WAIT) * 100);
      const held = p.state === "held";
      body = `
        <div class="aw-stats">
          <div><div class="aw-stat-v m">${Math.round(p.metres)} m</div><div class="aw-stat-l">Distance</div></div>
          <div><div class="aw-stat-v eta">${awEta(p)}</div><div class="aw-stat-l">Est. arrival</div></div>
          <div class="aw-move ${mv.cls}">${mv.txt}</div>
        </div>
        <div class="aw-suggest">
          <span class="lbl">Suggested</span>
          <span>${awSuggest(p)}</span>
        </div>
        <div class="aw-wait-row">
          <span>${held ? "Holding — extended wait" : "Standard wait"}</span>
          <b>${fmt(p.wait)} remaining</b>
        </div>
        <div class="aw-bar-wrap"><div class="aw-bar" style="width:${pct}%"></div></div>
        <div class="aw-actions">
          <button class="aw-btn aw-wait" onclick="awHold('${p.id}')">⏱️ Hold +2 min</button>
          <button class="aw-btn aw-go"   onclick="awResolve('${p.id}','departed')">Depart now</button>
        </div>`;
    }

    div.innerHTML = `
      <div class="aw-top">
        <div class="aw-ic">${p.icon}</div>
        <div>
          <div class="aw-name">Passenger approaching</div>
          <div class="aw-meta">${p.label} · Booking ${p.booking} · → ${p.stop}</div>
        </div>
        <div class="aw-pill">${pill}</div>
      </div>${body}`;
    list.appendChild(div);
  });
}

function awHold(id) {
  const p = AW_DEMO.find(x => x.id === id);
  if (!p || p.state === "departed" || p.state === "arrived") return;
  p.state = "held";
  p.wait += STD_WAIT;          // driver consciously extends
  renderAW();
}
function awResolve(id, state) {
  const p = AW_DEMO.find(x => x.id === id);
  if (p && p.state !== "arrived") p.state = state;
  renderAW();
}

// Simulated live progression so the demo runs itself on screen
setInterval(() => {
  let changed = false;
  AW_DEMO.forEach(p => {
    if (p.state === "arrived" || p.state === "departed") return;
    if (p.dir === "toward" && p.walk > 0) { p.metres = Math.max(0, p.metres - p.walk); }
    p.wait -= 1;
    if (p.metres <= 0) { p.state = "arrived"; }
    else if (p.wait <= 0 && p.state !== "held") { p.state = "departed"; }
    changed = true;
  });
  if (changed) renderAW();
}, 1000);

renderAW();   // shows immediately on page open
</script>
</body>
</html>
